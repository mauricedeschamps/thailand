<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Thailand Travel Guide - PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e2f">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        /* ダークモード (デフォルト) */
        body {
            --bg: #121212;
            --surface: #1e1e2f;
            --card: #2a2a3a;
            --text: #eeeeee;
            --text-secondary: #bbbbbb;
            --border: #444;
            --accent: #ff7b00;
            --shadow: rgba(0,0,0,0.5);
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }

        body.light {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #4a4a5a;
            --border: #dddddd;
            --accent: #e65c00;
            --shadow: rgba(0,0,0,0.1);
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        button, .lang-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
        }

        button.active-lang {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .sponsor {
            background: var(--surface);
            border-radius: 1.5rem;
            padding: 1rem;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--border);
        }
        .sponsor-img {
            width: 120px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            background: #ccc;
        }
        .sponsor-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
        }

        .carousel-container {
            position: relative;
            margin: 1rem 0;
        }
        .carousel-wrapper {
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            display: flex;
            gap: 0;
            scrollbar-width: thin;
        }
        .carousel-slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 0.5rem;
        }
        @media (min-width: 768px) {
            .carousel-slide {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .carousel-slide {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        .card {
            background: var(--card);
            border-radius: 1.5rem;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border);
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #555;
        }
        .card-content {
            padding: 1rem;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .card-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .carousel-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
        }
        .nav-dot.active {
            background: var(--accent);
            width: 24px;
            border-radius: 5px;
        }

        .detail-page {
            background: var(--bg);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .detail-img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
        }
        .back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .official-link {
            display: inline-block;
            margin-top: 1rem;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
        }

        footer {
            margin-top: 2rem;
            padding: 1.5rem 0;
            text-align: center;
            border-top: 1px solid var(--border);
        }
        .map-frame {
            margin: 1.5rem 0;
            border-radius: 1.5rem;
            overflow: hidden;
            height: 250px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .contact-email {
            color: var(--accent);
            text-decoration: none;
        }
        .hidden {
            display: none;
        }
    </style>
</head>

          url: "https://oldtownphuket.com/" },
        { id: 9, img: "https://picsum.photos/id/42/400/300",

          title: { en: "Khao Soi (Chiang Mai dish)", zh: "清迈咖喱面", th: "ข้าวซอยเชียงใหม่", ja: "カオソーイ（チェンマイ料理）" },

          shortDesc: { en: "Dinner cruise with temple lights.", zh: "夜景晚餐船，看寺庙灯光。", th: "อาหารค่ำลอยน้ำ ชมวัด illuminated", ja: "寺院のライトアップを楽しむディナークルーズ" },

          station: { en: "BTS Saphan Taksin", zh: "BTS Saphan Taksin站", th: "BTS สะพานตากสิน", ja: "BTSサパーンタクシン駅" },

    let currentLang = 'en';
    let currentSlide = 0;
    let selectedPlace = null;

    function updateLanguage() {
        document.getElementById('page-title').innerText = translations[currentLang].title;
        document.querySelectorAll('.sponsor-btn').forEach(btn => btn.innerText = translations[currentLang].sponsorBtn);
        renderCarousel();
        if (selectedPlace !== null) showDetail(selectedPlace);
    }

    function renderCarousel() {
        const slide1 = document.getElementById('slide1');
        const slide2 = document.getElementById('slide2');
        const items1 = places.slice(0,6);
        const items2 = places.slice(6,12);
        slide1.innerHTML = '';
        slide2.innerHTML = '';
        items1.forEach(p => createCard(p, slide1));
        items2.forEach(p => createCard(p, slide2));
        updateDots();
    }

    function createCard(place, container) {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => showDetail(place.id);
        const img = document.createElement('img');
        img.src = place.img;
        img.alt = place.title[currentLang];
        img.className = 'card-img';
        const content = document.createElement('div');
        content.className = 'card-content';
        const title = document.createElement('div');
        title.className = 'card-title';
        title.innerText = place.title[currentLang];
        const desc = document.createElement('div');
        desc.className = 'card-desc';
        desc.innerText = place.shortDesc[currentLang];
        content.appendChild(title);
        content.appendChild(desc);
        card.appendChild(img);
        card.appendChild(content);
        container.appendChild(card);
    }

    function updateDots() {
        const nav = document.getElementById('carouselNav');
        nav.innerHTML = '';
        for (let i = 0; i < 2; i++) {
            const dot = document.createElement('div');
            dot.className = 'nav-dot' + (i === currentSlide ? ' active' : '');
            dot.onclick = () => goToSlide(i);
            nav.appendChild(dot);
        }
    }

    function goToSlide(index) {
        const wrapper = document.getElementById('carouselWrapper');
        const slideWidth = wrapper.clientWidth;
        wrapper.scrollTo({ left: index * slideWidth, behavior: 'smooth' });
        currentSlide = index;
        updateDots();
    }

    function initCarouselScroll() {
        const wrapper = document.getElementById('carouselWrapper');
        wrapper.addEventListener('scroll', () => {
            const newIndex = Math.round(wrapper.scrollLeft / wrapper.clientWidth);
            if (newIndex !== currentSlide) {
                currentSlide = newIndex;
                updateDots();
            }
        });
        window.addEventListener('resize', () => goToSlide(currentSlide));
    }

    function showDetail(id) {
        selectedPlace = id;
        const place = places[id];
        const detailDiv = document.getElementById('detailView');
        const mainView = document.getElementById('mainView');
        mainView.classList.add('hidden');
        detailDiv.classList.remove('hidden');
        const trans = translations[currentLang];
        detailDiv.innerHTML = `
            <div class="detail-page">
                <button class="back-btn" id="backToListBtn">${trans.backBtn}</button>
                <img class="detail-img" src="${place.img}" alt="${place.title[currentLang]}">
                <h2>${place.title[currentLang]}</h2>
                <p><strong>⭐</strong> ${place.shortDesc[currentLang]}</p>
                <p><strong>${trans.attractionLabel}</strong><br> ${place.detail[currentLang]}</p>
                <p><strong>${trans.stationLabel}</strong><br> ${place.station[currentLang]}</p>
                <a href="${place.url}" target="_blank" class="official-link">${trans.officialSite} ↗</a>
            </div>
        `;
        document.getElementById('backToListBtn').onclick = () => {
            detailDiv.classList.add('hidden');
            mainView.classList.remove('hidden');
            selectedPlace = null;
        };
    }

    function initTheme() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!localStorage.getItem('theme')) {
            document.body.classList.toggle('light', !prefersDark);
        } else {
            document.body.classList.toggle('light', localStorage.getItem('theme') === 'light');
        }
        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
    }

    function initLang() {
        const btns = document.querySelectorAll('.lang-btn');
        btns.forEach(btn => {
            btn.onclick = () => {
                currentLang = btn.dataset.lang;
                btns.forEach(b => b.classList.remove('active-lang'));
                btn.classList.add('active-lang');
                updateLanguage();
            };
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        // スポンサーのデモ設定（後で変更可）
        document.getElementById('sponsorTopImg').src = "https://picsum.photos/id/10/120/60";
        document.getElementById('sponsorTopLink').href = "https://www.tourismthailand.org";
        document.getElementById('sponsorBottomImg').src = "https://picsum.photos/id/12/120/60";
        document.getElementById('sponsorBottomLink').href = "https://www.thailandfestival.com";
        renderCarousel();
        initCarouselScroll();
        goToSlide(0);
        initTheme();
        initLang();
        updateLanguage();
    });

    // サービスワーカー登録
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW registered: ', reg);
            }).catch(err => console.log('SW registration failed: ', err));
        });
    }
</script>
